<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}FETCH label review{% endblock %}</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='app.css') }}">
</head>
<body>
  <header class="site-header">
    <a class="brand" href="{{ url_for('index') }}">FETCH silver-label review</a>
    <nav>
      <a href="{{ url_for('export_csv') }}">Export CSV</a>
      <a href="{{ url_for('export_json') }}">Export JSON</a>
      {% if session.get('authenticated') %}
      <form method="post" action="{{ url_for('logout') }}" class="inline-form">
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
        <button class="link-button" type="submit">Log out</button>
      </form>
      {% endif %}
    </nav>
  </header>
  <main>
    {% for category, message in get_flashed_messages(with_categories=true) %}
      <div class="flash {{ category }}">{{ message }}</div>
    {% endfor %}
    {% block content %}{% endblock %}
  </main>
  {% block scripts %}{% endblock %}
</body>
</html>
