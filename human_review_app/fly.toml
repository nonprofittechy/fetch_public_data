app = "fetch-silver-label-review"
primary_region = "iad"

[build]
  dockerfile = "human_review_app/Dockerfile"

[env]
  REVIEW_DB_PATH = "/data/reviews.sqlite3"
  REVIEW_CASES_PATH = "/app/data/review_cases.json"
  REVIEW_TAXONOMY_PATH = "/app/data/taxonomy.json"
  COOKIE_SECURE = "1"

[[mounts]]
  source = "review_data"
  destination = "/data"
  initial_size = "1gb"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0
  processes = ["app"]

  [[http_service.checks]]
    interval = "15s"
    timeout = "2s"
    grace_period = "10s"
    method = "GET"
    path = "/healthz"
