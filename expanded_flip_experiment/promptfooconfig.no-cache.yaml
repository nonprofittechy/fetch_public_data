# yaml-language-server: $schema=https://promptfoo.dev/config-schema.json
description: Expanded 1,000-candidate paired hidden-fact benchmark (cache disabled)

tags:
  suite: expanded_flip_1000
  cache_policy: disabled

prompts:
  - "{{opening_query}}"

tests: file://candidates/expanded_flip_candidates_1000.csv

providers:
  - id: file://two_step_provider_bridge.py
    label: intended-hidden-fact
    config: &base_config
      condition: intended
      # Official high-concurrency runs use the stable paid model plus the
      # deterministic baseline. Mistral, Gemini, and SPOT failures observed in
      # preserved pilots are documented in analysis/EXECUTION_LOG.md.
      enabled_providers: ["gpt-5", "keyword"]
      decision_mode: vote
      taxonomy_name: default
      cache_enabled: false
      cache_dir: ../cache
      semantic_merge_model: gpt-5
      match_model: gpt-4.1
  - id: file://two_step_provider_bridge.py
    label: counterfactual-hidden-fact
    config:
      <<: *base_config
      condition: counterfactual

defaultTest:
  assert:
    - type: javascript
      metric: valid_json
      value: |
        try {
          const data = typeof output === 'string' ? JSON.parse(output) : output;
          return {pass: !!data && !data.error, score: data?.error ? 0 : 1,
                  reason: data?.error || 'Valid provider result'};
        } catch (e) {
          return {pass: false, score: 0, reason: `JSON parse failed: ${e.message}`};
        }
    - type: javascript
      metric: hidden_fact_question_coverage
      value: |
        const data = typeof output === 'string' ? JSON.parse(output) : output;
        const matched = !!data.question_matched;
        return {pass: matched, score: matched ? 1 : 0,
                reason: matched ? `Matched: ${data.matched_question}` : 'No generated question elicited the hidden fact'};
    - type: javascript
      metric: final_category_correct_when_matched
      value: |
        const data = typeof output === 'string' ? JSON.parse(output) : output;
        if (!data.question_matched) return {pass: true, score: null, reason: 'N/A: fact was not elicited'};
        const correct = !!data.final_category_correct;
        return {pass: correct, score: correct ? 1 : 0,
                reason: correct ? `Final: ${data.final_top_label}` : `Unexpected final: ${data.final_top_label}`};
    - type: javascript
      metric: final_subcategory_correct_when_matched
      value: |
        const data = typeof output === 'string' ? JSON.parse(output) : output;
        if (!data.question_matched) return {pass: true, score: null, reason: 'N/A: fact was not elicited'};
        const correct = !!data.final_subcategory_correct;
        return {pass: correct, score: correct ? 1 : 0,
                reason: correct ? `Exact final: ${data.final_top_label}` : `Wrong exact label: ${data.final_top_label}`};
